<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q"Sink</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #0a0a0a;
            --muted: #737373;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --fg: #fafafa;
                --muted: #888888;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
            color: var(--fg);
            background: var(--bg);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        header {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.75rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.015em;
            color: var(--fg);
            text-decoration: none;
        }

        .logo .q {
            font-style: italic;
        }

        .logo .credit {
            color: var(--muted);
            font-weight: 400;
            margin-left: 0.5rem;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9375rem;
            transition: color 0.15s ease;
        }

        nav a:hover {
            color: var(--fg);
        }

        @media (max-width: 600px) {
            header {
                padding: 1.5rem 1.25rem;
            }
            .logo {
                font-size: 1.0625rem;
            }
        }

        ::selection {
            background: var(--fg);
            color: var(--bg);
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo"><span class="q">Q</span>"Sink<span class="credit">(HD &amp; DY)</span></a>
        <nav>
            <a href="mailto:hello@qsink.com">Contact</a>
        </nav>
    </header>
</body>
</html>
